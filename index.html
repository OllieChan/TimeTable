<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0a">
<title>TIME TABLE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --card: #161616;
    --border: #222222;
    --accent: #e8c840;
    --accent2: #e84040;
    --text: #f0f0f0;
    --muted: #666;
    --eng106: #e84040;
    --eng109: #40a8e8;
    --eng111: #40e8a0;
    --kma152: #e8c840;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* INTRO OVERLAY */
  #intro {
    position: fixed;
    inset: 0;
    z-index: 1000;
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    overflow: hidden;
  }

  #intro::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(255,255,255,0.015) 2px,
      rgba(255,255,255,0.015) 4px
    );
    pointer-events: none;
  }

  .intro-ring {
    position: absolute;
    border-radius: 50%;
    border: 1px solid rgba(232,200,64,0.15);
    animation: pulse-ring 3s ease-in-out infinite;
  }
  .intro-ring:nth-child(1) { width: 200px; height: 200px; animation-delay: 0s; }
  .intro-ring:nth-child(2) { width: 350px; height: 350px; animation-delay: 0.5s; }
  .intro-ring:nth-child(3) { width: 500px; height: 500px; animation-delay: 1s; }

  @keyframes pulse-ring {
    0%, 100% { opacity: 0.3; transform: scale(1); }
    50% { opacity: 0.8; transform: scale(1.05); }
  }

  .intro-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: clamp(3rem, 18vw, 8rem);
    letter-spacing: -0.02em;
    text-transform: uppercase;
    line-height: 0.9;
    text-align: center;
    position: relative;
    z-index: 1;
  }

  .intro-title .time-word {
    display: block;
    color: var(--accent);
    text-shadow: 0 0 60px rgba(232,200,64,0.5), 0 0 120px rgba(232,200,64,0.2);
    animation: flicker 4s ease-in-out infinite;
  }

  .intro-title .table-word {
    display: block;
    color: #fff;
    -webkit-text-stroke: 1px rgba(255,255,255,0.3);
  }

  @keyframes flicker {
    0%, 95%, 100% { opacity: 1; }
    96% { opacity: 0.6; }
    97% { opacity: 1; }
    98% { opacity: 0.4; }
    99% { opacity: 1; }
  }

  .intro-tap {
    position: relative;
    z-index: 1;
    margin-top: 2rem;
    font-size: 0.8rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--muted);
    animation: blink 1.5s ease-in-out infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.2; }
  }

  .intro-audio-note {
    position: relative;
    z-index: 1;
    margin-top: 0.75rem;
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    color: #333;
    text-align: center;
    padding: 0 2rem;
  }

  /* TRANSITION SCREEN */
  #transition {
    position: fixed;
    inset: 0;
    z-index: 999;
    background: #000;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    overflow: hidden;
  }

  .transition-flash {
    position: absolute;
    inset: 0;
    background: var(--accent);
    opacity: 0;
    animation: none;
  }

  .transition-flash.go {
    animation: flash-in 0.12s ease-out forwards;
  }

  @keyframes flash-in {
    0% { opacity: 0; }
    40% { opacity: 0.18; }
    100% { opacity: 0; }
  }

  .transition-bars {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  .t-bar {
    flex: 1;
    background: var(--accent);
    transform: scaleX(0);
    transform-origin: left;
  }

  .t-bar.go {
    animation: bar-wipe 0.6s cubic-bezier(0.77,0,0.18,1) forwards;
  }
  .t-bar:nth-child(1).go { animation-delay: 0s; }
  .t-bar:nth-child(2).go { animation-delay: 0.04s; }
  .t-bar:nth-child(3).go { animation-delay: 0.08s; }
  .t-bar:nth-child(4).go { animation-delay: 0.12s; }
  .t-bar:nth-child(5).go { animation-delay: 0.06s; }
  .t-bar:nth-child(6).go { animation-delay: 0.02s; }
  .t-bar:nth-child(7).go { animation-delay: 0.10s; }
  .t-bar:nth-child(8).go { animation-delay: 0.14s; }

  @keyframes bar-wipe {
    0% { transform: scaleX(0); }
    50% { transform: scaleX(1); transform-origin: left; }
    50.01% { transform-origin: right; }
    100% { transform: scaleX(0); transform-origin: right; }
  }

  .transition-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: clamp(3rem, 20vw, 9rem);
    text-transform: uppercase;
    line-height: 0.85;
    text-align: center;
    color: var(--accent);
    position: relative;
    z-index: 2;
    opacity: 0;
    transform: scale(0.8);
    letter-spacing: -0.02em;
    text-shadow: 0 0 80px rgba(232,200,64,0.6), 0 0 160px rgba(232,200,64,0.2);
  }

  .transition-title.go {
    animation: title-pop 0.5s cubic-bezier(0.34,1.56,0.64,1) 0.15s forwards;
  }

  @keyframes title-pop {
    0% { opacity: 0; transform: scale(0.8); }
    100% { opacity: 1; transform: scale(1); }
  }

  .transition-title.visible {
    opacity: 1;
    transform: scale(1);
    animation: title-pulse 2s ease-in-out infinite;
  }

  @keyframes title-pulse {
    0%, 100% { text-shadow: 0 0 80px rgba(232,200,64,0.6), 0 0 160px rgba(232,200,64,0.2); }
    50% { text-shadow: 0 0 120px rgba(232,200,64,0.9), 0 0 240px rgba(232,200,64,0.4); }
  }

  .transition-rings {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1;
    opacity: 0;
    transition: opacity 0.5s ease 0.5s;
  }

  .transition-rings.visible { opacity: 1; }

  .t-ring {
    position: absolute;
    border-radius: 50%;
    border: 1px solid rgba(232,200,64,0.2);
  }
  .t-ring:nth-child(1) { width: 250px; height: 250px; animation: t-pulse 2s ease-in-out infinite 0s; }
  .t-ring:nth-child(2) { width: 400px; height: 400px; animation: t-pulse 2s ease-in-out infinite 0.4s; }
  .t-ring:nth-child(3) { width: 550px; height: 550px; animation: t-pulse 2s ease-in-out infinite 0.8s; }
  .t-ring:nth-child(4) { width: 700px; height: 700px; animation: t-pulse 2s ease-in-out infinite 1.2s; }

  @keyframes t-pulse {
    0%, 100% { opacity: 0.2; transform: scale(1); }
    50% { opacity: 0.7; transform: scale(1.04); }
  }

  .skip-hint {
    position: absolute;
    bottom: 2rem;
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(232,200,64,0.3);
    z-index: 2;
    opacity: 0;
    animation: fade-in-hint 0.5s ease 0.8s forwards;
  }

  @keyframes fade-in-hint {
    to { opacity: 1; }
  }
  #app {
    display: none;
    flex-direction: column;
    min-height: 100vh;
  }

  header {
    padding: 1.25rem 1.25rem 0;
    position: sticky;
    top: 0;
    z-index: 100;
    background: linear-gradient(to bottom, var(--bg) 85%, transparent);
  }

  .header-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1rem;
  }

  .app-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 1.6rem;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .app-title span { color: var(--accent); }

  .today-badge {
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 0.3rem 0.6rem;
    border-radius: 4px;
  }

  /* WEEK NAV */
  .week-nav {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin-bottom: 1rem;
  }

  .week-nav button {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    width: 32px;
    height: 32px;
    border-radius: 6px;
    font-size: 1rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s, border-color 0.15s;
  }

  .week-nav button:active { background: var(--border); }

  .week-label {
    flex: 1;
    text-align: center;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 1rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .week-label.current-week { color: var(--accent); }

  /* DAY TABS */
  .day-tabs {
    display: flex;
    gap: 0.4rem;
    overflow-x: auto;
    scrollbar-width: none;
    padding-bottom: 0.25rem;
    margin-bottom: 0;
  }
  .day-tabs::-webkit-scrollbar { display: none; }

  .day-tab {
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0.5rem 0.75rem;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface);
    cursor: pointer;
    transition: all 0.15s;
    min-width: 48px;
    position: relative;
  }

  .day-tab.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #000;
  }

  .day-tab.today:not(.active) {
    border-color: var(--accent);
  }

  .day-tab .day-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .day-tab .day-num {
    font-size: 1.1rem;
    font-weight: 600;
    line-height: 1;
  }

  .day-tab .dot-row {
    display: flex;
    gap: 2px;
    margin-top: 3px;
    min-height: 5px;
  }

  .day-tab .dot {
    width: 4px;
    height: 4px;
    border-radius: 50%;
  }

  .day-tab.active .dot { background: rgba(0,0,0,0.5); }

  /* CONTENT */
  .content {
    flex: 1;
    padding: 1rem 1.25rem 2rem;
  }

  .day-heading {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 2rem;
    letter-spacing: -0.01em;
    margin-bottom: 1rem;
    text-transform: uppercase;
  }

  .day-heading .day-full { color: var(--text); }
  .day-heading .date-full { color: var(--muted); font-weight: 400; font-size: 1.1rem; display: block; margin-top: -0.2rem; }

  .empty-day {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 3rem 0;
    color: var(--muted);
    text-align: center;
    gap: 0.5rem;
  }

  .empty-day .empty-icon { font-size: 2.5rem; opacity: 0.4; }
  .empty-day .empty-text { font-size: 0.85rem; letter-spacing: 0.1em; text-transform: uppercase; }

  /* CLASS CARDS */
  .class-list {
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
  }

  .class-card {
    background: var(--card);
    border-radius: 12px;
    border: 1px solid var(--border);
    overflow: hidden;
    display: flex;
    position: relative;
    transition: transform 0.15s;
  }

  .class-card:active { transform: scale(0.98); }

  .class-stripe {
    width: 4px;
    flex-shrink: 0;
  }

  .class-body {
    padding: 0.9rem 1rem;
    flex: 1;
  }

  .class-time-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 0.3rem;
  }

  .class-time {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 1.1rem;
    letter-spacing: 0.05em;
    color: var(--text);
  }

  .class-duration {
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .class-name {
    font-weight: 600;
    font-size: 1rem;
    margin-bottom: 0.2rem;
    line-height: 1.2;
  }

  .class-type {
    display: inline-block;
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 0.15rem 0.5rem;
    border-radius: 3px;
    margin-bottom: 0.4rem;
    font-weight: 600;
  }

  .class-location {
    font-size: 0.78rem;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 0.3rem;
  }

  .class-location::before {
    content: '📍';
    font-size: 0.7rem;
  }

  /* UPCOMING PILL */
  .now-badge {
    position: absolute;
    top: 0.6rem;
    right: 0.75rem;
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    background: var(--accent2);
    color: #fff;
    padding: 0.2rem 0.5rem;
    border-radius: 3px;
    font-weight: 700;
    animation: pulse-badge 1.5s ease-in-out infinite;
  }

  @keyframes pulse-badge {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.6; }
  }

  .next-badge {
    position: absolute;
    top: 0.6rem;
    right: 0.75rem;
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    background: var(--accent);
    color: #000;
    padding: 0.2rem 0.5rem;
    border-radius: 3px;
    font-weight: 700;
  }

  /* NEXT CLASS BANNER */
  .next-banner {
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    border-radius: 8px;
    padding: 0.75rem 1rem;
    margin-bottom: 1.25rem;
    display: none;
  }

  .next-banner.visible { display: block; }

  .next-banner-label {
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 0.2rem;
    font-weight: 700;
  }

  .next-banner-info {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 1.1rem;
    letter-spacing: 0.03em;
  }

  .next-banner-sub {
    font-size: 0.78rem;
    color: var(--muted);
    margin-top: 0.1rem;
  }

  /* AUDIO SETUP */
  .audio-setup {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1rem;
    margin-bottom: 1.25rem;
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }

  .audio-setup-icon { font-size: 1.5rem; }

  .audio-setup-text { flex: 1; }
  .audio-setup-text strong { font-size: 0.85rem; display: block; }
  .audio-setup-text span { font-size: 0.72rem; color: var(--muted); }

  .audio-upload-btn {
    background: var(--accent);
    color: #000;
    border: none;
    padding: 0.4rem 0.75rem;
    border-radius: 6px;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    cursor: pointer;
    font-family: 'Barlow Condensed', sans-serif;
    flex-shrink: 0;
  }

  #audio-file-input { display: none; }

  .audio-loaded {
    background: var(--card);
    border-color: var(--eng111);
  }

  .audio-loaded .audio-setup-icon::after { content: ' ✓'; font-size: 0.8rem; color: var(--eng111); }

  /* SUBJECT LEGEND */
  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    margin-bottom: 1.25rem;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.06em;
  }

  .legend-dot {
    width: 8px;
    height: 8px;
    border-radius: 2px;
    flex-shrink: 0;
  }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<!-- INTRO OVERLAY -->
<div id="intro" onclick="launchApp()">
  <div class="intro-ring"></div>
  <div class="intro-ring"></div>
  <div class="intro-ring"></div>
  <div class="intro-title">
    <span class="time-word">TIME</span>
    <span class="table-word">TABLE</span>
  </div>
  <div class="intro-tap">Tap to enter</div>

</div>

<!-- TRANSITION SCREEN -->
<div id="transition" onclick="skipTransition()">
  <div class="transition-flash" id="t-flash"></div>
  <div class="transition-bars" id="t-bars">
    <div class="t-bar"></div>
    <div class="t-bar"></div>
    <div class="t-bar"></div>
    <div class="t-bar"></div>
    <div class="t-bar"></div>
    <div class="t-bar"></div>
    <div class="t-bar"></div>
    <div class="t-bar"></div>
  </div>
  <div class="transition-rings" id="t-rings">
    <div class="t-ring"></div>
    <div class="t-ring"></div>
    <div class="t-ring"></div>
    <div class="t-ring"></div>
  </div>
  <div class="transition-title" id="t-title">TIME<br>TABLE</div>
  <div class="skip-hint">Tap to skip</div>
</div>

<!-- MAIN APP -->
<div id="app">
  <header>
    <div class="header-top">
      <div class="app-title">Time<span>Table</span></div>
      <div class="today-badge" id="today-badge">—</div>
    </div>
    <div class="week-nav">
      <button onclick="changeWeek(-1)">‹</button>
      <div class="week-label" id="week-label">This Week</div>
      <button onclick="changeWeek(1)">›</button>
    </div>
    <div class="day-tabs" id="day-tabs"></div>
  </header>

  <div class="content" id="content"></div>
</div>

<audio id="intro-audio" src="/theme.mp3"></audio>

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function parseDate(str) {
  // Format: 20260226T130000 → AEST (UTC+10/11)
  const y = +str.slice(0,4), mo = +str.slice(4,6)-1, d = +str.slice(6,8);
  const h = +str.slice(9,11), mi = +str.slice(11,13);
  return new Date(y, mo, d, h, mi);
}

function fmt12(date) {
  let h = date.getHours(), m = date.getMinutes(), ampm = h >= 12 ? 'pm' : 'am';
  h = h % 12 || 12;
  return `${h}:${String(m).padStart(2,'0')}${ampm}`;
}

function fmtDuration(start, end) {
  const mins = (end - start) / 60000;
  if (mins < 60) return `${mins}m`;
  const h = Math.floor(mins/60), m = mins%60;
  return m ? `${h}h ${m}m` : `${h}h`;
}

const DAY_NAMES = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const DAY_FULL = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MONTH_NAMES = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

// ─── STATE ────────────────────────────────────────────────────────────────────
let weekOffset = 0;
let selectedDayIndex = 0; // 0=Sun index in week
let audioLoaded = true;
let audioURL = null;

function getWeekStart(offset = 0) {
  const now = new Date();
  const day = now.getDay(); // 0=Sun
  const monday = new Date(now);
  monday.setDate(now.getDate() - day + 1 + offset * 7); // week starts Monday
  monday.setHours(0,0,0,0);
  return monday;
}

function getWeekDays(offset = 0) {
  const mon = getWeekStart(offset);
  return Array.from({length:7}, (_,i) => {
    const d = new Date(mon);
    d.setDate(mon.getDate() + i);
    return d;
  });
}

function getEventsForDay(date) {
  const y = date.getFullYear(), m = date.getMonth(), d = date.getDate();
  return RAW_EVENTS
    .map(e => ({...e, startD: parseDate(e.start), endD: parseDate(e.end)}))
    .filter(e => e.startD.getFullYear()===y && e.startD.getMonth()===m && e.startD.getDate()===d)
    .sort((a,b) => a.startD - b.startD);
}

function isToday(date) {
  const now = new Date();
  return date.getDate()===now.getDate() && date.getMonth()===now.getMonth() && date.getFullYear()===now.getFullYear();
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function renderTabs() {
  const days = getWeekDays(weekOffset);
  const tabs = document.getElementById('day-tabs');
  const now = new Date();

  // Find first day with events, or today
  const todayIdx = days.findIndex(d => isToday(d));

  tabs.innerHTML = days.map((day, i) => {
    const events = getEventsForDay(day);
    const isT = isToday(day);
    const isActive = i === selectedDayIndex;
    const dots = events.slice(0,4).map(e => {
      const col = SUBJECTS[e.s]?.color || '#666';
      return `<div class="dot" style="background:${isActive ? 'rgba(0,0,0,0.5)' : col}"></div>`;
    }).join('');

    return `<div class="day-tab${isT?' today':''}${isActive?' active':''}" onclick="selectDay(${i})">
      <div class="day-name">${DAY_NAMES[(day.getDay())]}</div>
      <div class="day-num">${day.getDate()}</div>
      <div class="dot-row">${dots}</div>
    </div>`;
  }).join('');
}

function renderContent() {
  const days = getWeekDays(weekOffset);
  const day = days[selectedDayIndex];
  const events = getEventsForDay(day);
  const now = new Date();
  const content = document.getElementById('content');

  let html = '';

  // Subject legend for this day
  if (isToday(day) && events.length > 0) {
    const upcoming = events.find(e => e.endD > now);
    if (upcoming) {
      const isNow = upcoming.startD <= now && upcoming.endD > now;
      const sub = SUBJECTS[upcoming.s];
      const label = isNow ? '🔴 Happening now' : '⏭ Next up';
      const timeStr = isNow
        ? `Ends ${fmt12(upcoming.endD)}`
        : `Starts ${fmt12(upcoming.startD)}`;
      html += `<div class="next-banner visible">
        <div class="next-banner-label">${label}</div>
        <div class="next-banner-info">${sub?.short || upcoming.s} — ${TYPE_LABELS[upcoming.t] || upcoming.t}</div>
        <div class="next-banner-sub">${timeStr} · ${upcoming.loc}</div>
      </div>`;
    }
  }

  // Day heading
  const dateStr = `${day.getDate()} ${MONTH_NAMES[day.getMonth()]}`;
  html += `<div class="day-heading">
    <span class="day-full">${DAY_FULL[day.getDay()]}</span>
    <span class="date-full">${dateStr}</span>
  </div>`;

  if (events.length === 0) {
    html += `<div class="empty-day">
      <div class="empty-icon">🎮</div>
      <div class="empty-text">No classes today</div>
    </div>`;
  } else {
    // Subject legend for this day
    const subjects = [...new Set(events.map(e => e.s))];
    html += `<div class="legend">` + subjects.map(s => {
      const sub = SUBJECTS[s];
      return `<div class="legend-item"><div class="legend-dot" style="background:${sub.color}"></div>${sub.short}</div>`;
    }).join('') + `</div>`;

    html += `<div class="class-list">`;
    events.forEach(e => {
      const sub = SUBJECTS[e.s];
      const color = sub?.color || '#666';
      const isNow = e.startD <= now && e.endD > now;
      const isNext = !isNow && e.startD > now && events.find(ev => ev.startD > now) === e;
      const badge = isNow ? `<div class="now-badge">Now</div>` : (isNext && isToday(day) ? `<div class="next-badge">Next</div>` : '');
      const typeLabel = TYPE_LABELS[e.t] || e.t;
      const isTest = e.t === 'Test-A';

      html += `<div class="class-card">
        <div class="class-stripe" style="background:${color}"></div>
        <div class="class-body">
          ${badge}
          <div class="class-time-row">
            <div class="class-time">${fmt12(e.startD)} – ${fmt12(e.endD)}</div>
            <div class="class-duration">${fmtDuration(e.startD, e.endD)}</div>
          </div>
          <div class="class-name">${sub?.name || e.s}</div>
          <div class="class-type" style="background:${isTest ? '#e84040' : color}22; color:${isTest ? '#e84040' : color}">${typeLabel}</div>
          <div class="class-location">${e.loc}</div>
        </div>
      </div>`;
    });
    html += `</div>`;
  }

  content.innerHTML = html;
}

function renderWeekLabel() {
  const label = document.getElementById('week-label');
  if (weekOffset === 0) {
    label.textContent = 'This Week';
    label.className = 'week-label current-week';
  } else if (weekOffset === 1) {
    label.textContent = 'Next Week';
    label.className = 'week-label';
  } else if (weekOffset === -1) {
    label.textContent = 'Last Week';
    label.className = 'week-label';
  } else {
    const days = getWeekDays(weekOffset);
    label.textContent = `${days[0].getDate()} ${MONTH_NAMES[days[0].getMonth()]}`;
    label.className = 'week-label';
  }
}

function renderTodayBadge() {
  const now = new Date();
  document.getElementById('today-badge').textContent =
    `${DAY_NAMES[now.getDay()]} ${now.getDate()} ${MONTH_NAMES[now.getMonth()]}`;
}

function render() {
  renderTodayBadge();
  renderWeekLabel();
  renderTabs();
  renderContent();
}

// ─── ACTIONS ──────────────────────────────────────────────────────────────────
function selectDay(i) {
  selectedDayIndex = i;
  render();
}

function changeWeek(dir) {
  weekOffset += dir;
  // default to Monday (index 0) when switching weeks, unless current week show today
  if (weekOffset === 0) {
    const now = new Date();
    const mon = getWeekStart(0);
    selectedDayIndex = Math.floor((now - mon) / 86400000);
    if (selectedDayIndex < 0) selectedDayIndex = 0;
    if (selectedDayIndex > 6) selectedDayIndex = 6;
  } else {
    selectedDayIndex = 0;
  }
  render();
}

let transitionDone = false;

function launchApp() {
  const intro = document.getElementById('intro');
  const transition = document.getElementById('transition');

  // Play audio
  const audio = document.getElementById('intro-audio');
  audio.currentTime = 0;
  audio.play().catch(()=>{});

  // Hide intro, show transition
  intro.style.transition = 'opacity 0.25s';
  intro.style.opacity = '0';
  setTimeout(() => {
    intro.style.display = 'none';
    transition.style.display = 'flex';

    // Trigger animations
    requestAnimationFrame(() => {
      document.getElementById('t-flash').classList.add('go');
      document.getElementById('t-title').classList.add('go');
      document.querySelectorAll('.t-bar').forEach(b => b.classList.add('go'));
    });

    // After initial animation settles, switch to pulsing idle state
    setTimeout(() => {
      const title = document.getElementById('t-title');
      title.classList.remove('go');
      title.classList.add('visible');
      document.getElementById('t-rings').classList.add('visible');
    }, 800);

    // Auto-advance after 10s
    setTimeout(() => showApp(), 10000);
  }, 250);
}

function skipTransition() {
  if (transitionDone) return;
  showApp();
}

function showApp() {
  if (transitionDone) return;
  transitionDone = true;
  const transition = document.getElementById('transition');
  const app = document.getElementById('app');
  transition.style.transition = 'opacity 0.35s';
  transition.style.opacity = '0';
  setTimeout(() => {
    transition.style.display = 'none';
    app.style.display = 'flex';
  }, 350);
}



// ─── INIT ─────────────────────────────────────────────────────────────────────
// Set initial selected day to today (Mon-Sun index in week)
(function() {
  const now = new Date();
  const mon = getWeekStart(0);
  const diff = Math.floor((now - mon) / 86400000);
  selectedDayIndex = (diff >= 0 && diff <= 6) ? diff : 0;
  render();
})();

// Auto-refresh every minute for now/next badges
setInterval(render, 60000);
</script>
</body>
</html>
